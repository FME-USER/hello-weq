<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f0f4f8;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    .card {
      background-color: #ffffff;
      border-radius: 16px;
      padding: 60px 80px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      color: #2d3748;
      letter-spacing: -0.5px;
    }

    h1 span {
      color: #4a90d9;
    }

    p {
      margin-top: 16px;
      font-size: 1rem;
      color: #718096;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello<span>一一江的江</span></h1>
    <p>Welcome to this page.</p>
  </div>
</body>
</html>
