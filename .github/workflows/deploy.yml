# generated-by: github-action-n
name: Deploy

on:
  push:
    branches:
      - master

env:
  REGION: asia-east1
  PROJECT_ID: vertex-ai-491502
  SERVICE_NAME: hello-weq

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set service name
        id: svc
        run: |
          echo "name=${{ env.SERVICE_NAME }}" >> $GITHUB_OUTPUT

      - name: Check security report
        run: |
          TODAY=$(date +%Y%m%d)
          REPORT=$(ls security-report-${TODAY}-*.docx 2>/dev/null | head -1)
          if [ -z "$REPORT" ]; then
            echo "No security report found. Cannot deploy. Please run security scan first."
            exit 1
          fi
          echo "Security report confirmed: $REPORT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/306010027590/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-actions-sa@vertex-ai-491502.iam.gserviceaccount.com"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ steps.svc.outputs.name }}
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          source: .
          flags: --no-invoker-iam-check

      - name: Show deployed URL
        run: |
          echo "========================================="
          echo "Deployed! Service: ${{ steps.svc.outputs.name }}"
          echo "URL: ${{ steps.deploy.outputs.url }}"
          echo "========================================="
